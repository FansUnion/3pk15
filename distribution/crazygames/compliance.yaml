    gap_zh: 待获 Portal 后配置；可能影响提交。

  - id: CG-PACK-001
    category: build
    phase: both
    requirement_en: CrazyGames build excludes Admin, standalone-only features, and non-CG ad networks.
    requirement_zh: CG 包不含 Admin、独立站专用能力与非 CG 广告网。
    level: required
