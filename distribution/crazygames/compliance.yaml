    gap_zh: 棋类首发不做 CG IAP。

  - id: CG-PAY-001
    category: business
    phase: full
    requirement_en: Complete Tipalti / Billing in Developer Portal before payouts; €100 minimum payout threshold.
    requirement_zh: 在 Developer Portal 完成 Tipalti/Billing；最低提现约 €100。
    level: required
    applicability: applicable
    status: missing
    official_url: https://docs.crazygames.com/
