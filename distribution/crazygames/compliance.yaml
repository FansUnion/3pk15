    gap_zh: 首发可延后；有云存/登录需求时再做。

  - id: CG-DATA-001
    category: account
    phase: full
    requirement_en: Optional Data module cloud save (1MB); enable Progress Save on submit when used.
    requirement_zh: 可选 Data 云存（1MB）；使用时提交勾选 Progress Save。
    level: recommended
    applicability: applicable
    status: missing
    official_url: https://docs.crazygames.com/sdk/intro#html5
    last_verified: 2026-07-18
    evidence:
