    gap_zh: 首发可延后。

  - id: CG-IAP-001
    category: monetization
    phase: full
    requirement_en: In-game purchases invite-only via Xsolla; logged-in users only — defer unless invited.
    requirement_zh: 内购邀请制、Xsolla、仅登录用户——未受邀则延后。
    level: not_applicable
