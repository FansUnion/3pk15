name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.0
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile
      - name: Core tests
        run: pnpm release:check -- --only=core-tests
      - name: Core typecheck
        run: pnpm release:check -- --only=core-types
      - name: Player tests
        run: pnpm release:check -- --only=player-tests
      - name: Admin tests
        run: pnpm release:check -- --only=admin-tests
      - name: Architecture and deployment boundaries
        run: |
          pnpm release:check -- --only=platform-boundaries
          pnpm release:check -- --only=player-boundaries
          pnpm release:check -- --only=source-boundaries
          pnpm release:check -- --only=deployment-contract
      - name: Public assets and skins
        run: |
          pnpm release:check -- --only=assets
          pnpm release:check -- --only=skins
      - name: Player production build
        run: pnpm release:check -- --only=player-build
      - name: Player artifact gates
        run: |
          pnpm release:check -- --only=player-report
          pnpm release:check -- --only=player-artifact
          pnpm release:check -- --only=external-boundary
      - name: Admin production build
        run: pnpm release:check -- --only=admin-build
      - name: Admin artifact gate
        run: pnpm release:check -- --only=admin-artifact
