name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm --filter @wolf-sheep/game-core test
      - run: pnpm --filter @wolf-sheep/game-core lint
      - run: pnpm --filter @wolf-sheep/web build
      - run: pnpm build:portal
      - run: pnpm check:skins
