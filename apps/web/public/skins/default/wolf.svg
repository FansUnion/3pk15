<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Meadow wolf — profile L, ear/snout/shoulder; readable at 36px -->
  <ellipse cx="34" cy="52" rx="14" ry="4" fill="#1a1f18" opacity="0.25"/>
  <!-- hind / body mass -->
  <path d="M48 28c4 2 8 8 7 16-1 7-6 12-14 14-10 2-20-1-28-8-5-4-8-10-6-14 3-8 12-14 24-14 6 0 12 2 17 6z" fill="#2a3328"/>
  <path d="M46 30c3 2 6 7 5 13-1 6-5 10-12 12-9 2-18-1-24-7-4-4-6-8-5-12 2-7 10-12 21-12 5 0 11 2 15 6z" fill="#3d4a3a"/>
  <!-- shoulder highlight -->
  <path d="M28 32c6-4 14-4 20 0 2 2 3 5 2 8-2 4-7 6-13 5-6-1-11-4-13-8-1-2 0-4 4-5z" fill="#5a6b55" opacity="0.55"/>
  <!-- neck + head -->
  <path d="M22 30c-2-6 2-14 10-16 5-1 9 1 12 5 2 3 2 7 0 10-3 5-9 7-15 6-4-1-7-3-7-5z" fill="#3d4a3a"/>
  <path d="M20 28c-1-5 2-11 8-13 4-1 7 1 9 4" fill="#4a5a46"/>
  <!-- snout -->
  <path d="M14 30c-6 1-10 4-11 7 0 2 2 3 5 3l8-1c2 0 3-2 2-4-1-3-2-5-4-5z" fill="#4a5a46"/>
  <path d="M6 36c1 1 3 2 5 2" stroke="#2a3328" stroke-width="1.2" stroke-linecap="round"/>
  <ellipse cx="5.5" cy="35.5" rx="1.6" ry="1.2" fill="#1a1f18"/>
  <!-- ear -->
  <path d="M30 14l2-10 8 8-2 6z" fill="#2a3328"/>
  <path d="M31 14l1-7 5 5z" fill="#6b5a48"/>
  <!-- eye -->
  <circle cx="22" cy="26" r="2.2" fill="#f4f1ea"/>
  <circle cx="21.5" cy="26.2" r="1.1" fill="#1a1f18"/>
  <circle cx="21.2" cy="25.8" r="0.35" fill="#f4f1ea"/>
  <!-- chest fluff -->
  <path d="M26 38c2 3 6 4 10 3" stroke="#c9c4b0" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
  <!-- legs -->
  <path d="M24 46c0 5 1 9 1 12M32 47c0 5 0 9 1 11M40 46c1 5 1 9 2 12M46 44c1 5 2 9 2 11" stroke="#1e261c" stroke-width="3.2" stroke-linecap="round"/>
  <path d="M24 46c0 5 1 9 1 12M32 47c0 5 0 9 1 11M40 46c1 5 1 9 2 12M46 44c1 5 2 9 2 11" stroke="#3d4a3a" stroke-width="1.6" stroke-linecap="round"/>
</svg>
